---
- name: download tar file 
  get_url:
    url: https://dlcdn.apache.org/tomcat/tomcat-10/v10.1.52/bin/apache-tomcat-10.1.52.tar.gz
    dest: /home/maha/apache-tomcat-10.1.52.tar.gz
    force_basic_auth: yes

- name:  create a tomcat folder 
  file:
     path: /opt/tomcat
     state: directory

- name: extract tar file 
  command: 
     cmd: sudo tar xzvf /home/maha/apache-tomcat-10.1.52.tar.gz -C /opt/tomcat --strip-components=1
     creates: /opt/tomcat/LICENSE 